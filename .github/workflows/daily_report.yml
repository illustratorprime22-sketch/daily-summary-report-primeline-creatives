name: Primeline Creatives Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: '05 14 * * 1-5' # 7:35 PM IST


jobs:
  report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Primeline Creatives report script
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD_MKAWS }}
      run: |
        python primeline_creatives_report.py
