name: Primeline Creatives Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5' # Runs at 1:30 AM UTC (7:00 AM IST) Monday through Friday

jobs:
  report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Primeline Creatives report script
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD_MKAWS }}
      run: |
        python primeline_creatives_report.py
